apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: music-backend-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: music-backend.secyour.space
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: music-backend-service
                port:
                  number: 80
