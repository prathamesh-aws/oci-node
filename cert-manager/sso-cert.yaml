apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sso-cert
  namespace: sso
spec:
  secretName: authentik-cert-tls
  dnsNames:
    - sso.secyour.space
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days before expiry
