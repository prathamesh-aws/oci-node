apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sonatype-cert
  namespace: sonatype
spec:
  secretName: nexus-cert-tls
  dnsNames:
    - sonatype-repo.secyour.space
    - docker.sonatype-repo.secyour.space
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days before expiry
