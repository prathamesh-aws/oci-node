apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: splunk-etc
  namespace: splunk
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: splunk-var
  namespace: splunk
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: splunk-admin-secret
  namespace: splunk
type: Opaque
data:
  password: YWRtaW4xMjM= # Base64-encoded 'admin123'; change as needed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: splunk-standalone
  namespace: splunk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splunk
  template:
    metadata:
      labels:
        app: splunk
    spec:
      initContainers:
        - name: configure-splunk
          image: splunk/splunk:latest
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /opt/splunk/etc/system/local
              echo "[user_info]
              USERNAME = admin
              PASSWORD = $(cat /splunk-secrets/password)" > /opt/splunk/etc/system/local/user-seed.conf
          volumeMounts:
            - name: splunk-etc
              mountPath: /opt/splunk/etc
            - name: splunk-secrets
              mountPath: /splunk-secrets
      containers:
        - name: splunk
          image: splunk/splunk:latest
          env:
            - name: SPLUNK_START_ARGS
              value: --accept-license
            - name: SPLUNK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: splunk-admin-secret
                  key: password
          ports:
            - containerPort: 8000
              name: web
            - containerPort: 8089
              name: splunkd
          volumeMounts:
            - name: splunk-etc
              mountPath: /opt/splunk/etc
            - name: splunk-var
              mountPath: /opt/splunk/var
          livenessProbe:
            httpGet:
              path: /en-US/account/login
              port: 8000
            initialDelaySeconds: 300
            timeoutSeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /en-US/account/login
              port: 8000
            initialDelaySeconds: 60
            timeoutSeconds: 30
            periodSeconds: 30
      volumes:
        - name: splunk-etc
          persistentVolumeClaim:
            claimName: splunk-etc
        - name: splunk-var
          persistentVolumeClaim:
            claimName: splunk-var
        - name: splunk-secrets
          secret:
            secretName: splunk-admin-secret
---
apiVersion: v1
kind: Service
metadata:
  name: splunk-standalone-service
  namespace: splunk
spec:
  selector:
    app: splunk
  ports:
    - name: web
      port: 8000
      targetPort: 8000
    - name: splunkd
      port: 8089
      targetPort: 8089
  type: ClusterIP
