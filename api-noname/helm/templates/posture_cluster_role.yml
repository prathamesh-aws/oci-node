{{- if .Values.enableClusterRole -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.posture.serviceAccount.name }}
  namespace: {{- toYaml .Release.Namespace | nindent 4 }}
  labels:
    {{- toYaml .Values.posture.labels | nindent 4 }}
      {{- include "helm.labels" . | nindent 4 }}
  {{- with .Values.posture.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.posture.clusterRole.name }}
rules:
  - apiGroups: [""]
    resources:
      - componentstatuses
      - configmaps
      - endpoints
      - limitranges
      - namespaces
      - nodes
      - persistentvolumes
      - pods
      - podtemplates
      - replicationcontrollers
      - resourcequotas
      - serviceaccounts
      - services
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources:
      - controllerrevisions
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["list"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["list"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs: ["list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["list"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingressclasses
      - ingresses
      - networkpolicies
    verbs: ["list"]
  - apiGroups: ["node.k8s.io"]
    resources:
      - runtimeclasses
    verbs: ["list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterrolebindings
      - clusterroles
      - rolebindings
      - roles
    verbs: ["list"]
  - apiGroups: ["scheduling.k8s.io"]
    resources:
      - priorityclasses
    verbs: ["list"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.posture.clusterRoleBinding.name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.posture.serviceAccount.name }}
    namespace: {{- toYaml .Release.Namespace | nindent 6 }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.posture.clusterRole.name }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
