apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: noname-remote-operator-role
  namespace: {{- toYaml .Release.Namespace | nindent 4 }}
  labels:
  {{- include "helm.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - apps
    resources:
      - daemonsets
      - deployments
    verbs:
      - get
      - update
      - create
      - delete
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - update
      - create
      - delete
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - pods
      - events
    verbs:
      - delete
      - list
