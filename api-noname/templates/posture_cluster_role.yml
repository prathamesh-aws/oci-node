---
# Source: noname-remote/templates/posture_cluster_role.yml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: noname-posture-service-account
  namespace:
    noname-security
  labels:
    app: noname-security-posture
    helm.sh/chart: noname-remote-1.0.0
    app.kubernetes.io/name: noname-remote
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.4"
    app.kubernetes.io/managed-by: Helm
---
# Source: noname-remote/templates/posture_cluster_role.yml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: noname-posture-cluster-role
rules:
  - apiGroups: [""]
    resources:
      - componentstatuses
      - configmaps
      - endpoints
      - limitranges
      - namespaces
      - nodes
      - persistentvolumes
      - pods
      - podtemplates
      - replicationcontrollers
      - resourcequotas
      - serviceaccounts
      - services
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources:
      - controllerrevisions
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["list"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["list"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs: ["list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["list"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingressclasses
      - ingresses
      - networkpolicies
    verbs: ["list"]
  - apiGroups: ["node.k8s.io"]
    resources:
      - runtimeclasses
    verbs: ["list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterrolebindings
      - clusterroles
      - rolebindings
      - roles
    verbs: ["list"]
  - apiGroups: ["scheduling.k8s.io"]
    resources:
      - priorityclasses
    verbs: ["list"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["list"]
---
# Source: noname-remote/templates/posture_cluster_role.yml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: noname-posture-cluster-role-binding
subjects:
  - kind: ServiceAccount
    name: noname-posture-service-account
    namespace:
      noname-security
roleRef:
  kind: ClusterRole
  name: noname-posture-cluster-role
  apiGroup: rbac.authorization.k8s.io
