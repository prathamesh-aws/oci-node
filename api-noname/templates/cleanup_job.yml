---
# Source: noname-remote/templates/cleanup_job.yml
apiVersion: batch/v1
kind: Job
metadata:
  name: operator-cleanup-job
  labels:
    app: noname-remote-operator
    helm.sh/chart: noname-remote-1.0.0
    app.kubernetes.io/name: noname-remote
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.4"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: noname-remote-operator-sa
      restartPolicy: Never
      containers:
        - name: remote-operator-cleanup
          image: "{{ JFROG_REGISTRY }}/noname-remote-operator:{{ REMOTE_OPERATOR_IMAGE_TAG }}"
          command: ["npm", "run", "cleanup"]
          env:
            - name: NOMANAGE_CLIENT_INSIDE_CONTAINER
              value: "true"
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
      imagePullSecrets:
        - name: noname-artifactory-credentials
