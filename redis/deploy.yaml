# redis-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: db
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7.0-alpine  # Stable, lightweight Redis version
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "256Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "100m"
        volumeMounts:
        - name: redis-storage
          mountPath: /data  # Redis default data directory
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-data

---
# redis-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: db
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  type: LoadBalancer  # Default type, accessible within the cluster
