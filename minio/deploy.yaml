---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio
spec:
  selector:
    app: minio
  ports:
    - port: 80
      targetPort: 9090
      protocol: TCP
      name: console
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: minio-s3
  namespace: minio
spec:
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: s3
#  type: ClusterIP
  type: LoadBalancer
