services:
  panw-network-client:
    # tag for reference: registry.ai-red-teaming.paloaltonetworks.com/pairs-redteam-prd-fckx/red-teaming-onprem/stable/network-broker-client:1.4.0
    image: "registry.ai-red-teaming.paloaltonetworks.com/pairs-redteam-prd-fckx/red-teaming-onprem/stable/network-broker-client@sha256:da98b47be8b654d876bde86d6d25e27fbec31eeed40cdcd2044906d84a84be0a"
    command: ["/app/client"]
    env_file:
      - .env.runtime
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          kill -0 1 2>/dev/null || exit 1
          grep -q '^State:[[:space:]]*Z' /proc/1/status 2>/dev/null && exit 1
          exit 0
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
